name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm run test:unit

  build-helper:
    name: build-helper (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: tar.gz
          - os: linux
            arch: arm64
            ext: tar.gz
          - os: darwin
            arch: amd64
            ext: tar.gz
          - os: darwin
            arch: arm64
            ext: tar.gz
          - os: windows
            arch: amd64
            ext: zip
          - os: windows
            arch: arm64
            ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tools/outline-helper/go.sum
      - name: Build outline-helper
        working-directory: tools/outline-helper
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          BIN_NAME=outline-helper
          if [ "$GOOS" = "windows" ]; then
            BIN_NAME=outline-helper.exe
          fi
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "${BIN_NAME}" .
          ARTIFACT="outline-helper-${GOOS}-${GOARCH}.${{ matrix.ext }}"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            zip -9 "${ARTIFACT}" "${BIN_NAME}"
          else
            tar -czf "${ARTIFACT}" "${BIN_NAME}"
          fi
          echo "ARTIFACT_PATH=tools/outline-helper/${ARTIFACT}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: outline-helper-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-helper]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npx @vscode/vsce package -o remote-ss-proxy-controller.vsix
      - name: Download helper artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: outline-helper-*
          path: release-assets
          merge-multiple: true
      - name: List release assets
        run: ls -la release-assets remote-ss-proxy-controller.vsix
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            remote-ss-proxy-controller.vsix
            release-assets/*
          generate_release_notes: true
